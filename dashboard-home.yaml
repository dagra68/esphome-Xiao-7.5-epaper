esphome:
  name: dashboard-home
  friendly_name: Dashboard Home

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

globals:
  - id: wifi_status
    type: int
    restore_value: no
    initial_value: "0"
  - id: first_update_done
    type: bool
    restore_value: no
    initial_value: "false"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - lambda: |-
          id(wifi_status) = 1;
  on_disconnect:
    then:
      - lambda: |-
          id(wifi_status) = 0;

captive_portal:

deep_sleep:
  id: deep_sleep_1
  run_duration: 1min
  sleep_duration: 5min

script:
  - id: update_display
    then:
      - component.update: my_display

interval:
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: "return !isnan(id(aussen_temp).state);"
              - lambda: "return !id(first_update_done);"
          then:
            - lambda: |-
                ESP_LOGD("Display", "Updating Display...");
            - script.execute: update_display
            - lambda: "id(first_update_done) = true;"
  - interval: 59s
    then:
      - logger.log: "Entering deep sleep now..."

time:
  - platform: homeassistant
    id: homeassistant_time

# --- Sensoren ---

sensor:
  - platform: homeassistant
    id: aussen_temp
    entity_id: sensor.gw1100a_v2_2_3_outdoor_temperature
    name: "Aussentemperatur"

