font:
  - file: "gfonts://Montserrat@900"
    id: font_header
    size: 26
  - file: "gfonts://Montserrat@900"
    id: font_label
    size: 22
  - file: "gfonts://Montserrat@900"
    id: font_value
    size: 36
  - file: "gfonts://Montserrat@900"
    id: font_status
    size: 20
  - file: "gfonts://Montserrat@900"
    id: font_tiny
    size: 18
  - file: "gfonts://Montserrat@900"
    id: font_termin
    size: 16

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 36
    glyphs:
      - "\U000F050F"   # thermometer
      - "\U000F10A3"   # home-battery
      - "\U000F007D"   # car-battery (Tesla SOC)
      - "\U000F1A73"   # solar-power (PV)
      - "\U000F0590"   # weather-cloudy
      - "\U000F0599"   # weather-sunny
      - "\U000F059D"   # weather-windy
      - "\U000F0A02"   # calendar-today
      - "\U000F0F38"   # trash-can (Muellabfuhr)
      - "\U000F1402"   # pump (Pool)
      - "\U000F1A44"   # heat-pump (Heizmodus)
      - "\U000F0EBB"   # ev-station (Auto laden)
      - "\U000F0FC6"   # window-open
      - "\U000F11DB"   # window-closed
      - "\U000F051F"   # wifi-off

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    model: 7.50inv2
    update_interval: 50s
    lambda: |-
      auto fval = [](float v, const char* fmt, char* buf, size_t sz) {
        if (!isnan(v)) snprintf(buf, sz, fmt, v);
        else           snprintf(buf, sz, "--");
      };

      char buf[24];
      int y;

      // ===== KOPFZEILE =====
      it.filled_rectangle(0, 0, 800, 52);
      it.strftime(16, 26, id(font_header), COLOR_OFF, TextAlign::CENTER_LEFT,
                   "%a %d.%m.%Y", id(homeassistant_time).now());
      it.strftime(790, 26, id(font_header), COLOR_OFF, TextAlign::CENTER_RIGHT,
                   "Update %H:%M", id(homeassistant_time).now());

      // ===== Trennlinie unter Header =====
      it.filled_rectangle(0, 52, 800, 2);

      // Spalten-Trennlinien
      it.filled_rectangle(265, 54, 2, 370);
      it.filled_rectangle(532, 54, 2, 370);

      // ===== SPALTE 1 (links): Sensoren =====
      int x1 = 12;
      int icon_x = 42;

      // -- Temp aussen --
      y = 64;
      it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F050F");
      it.print(70, y, id(font_label), "Temp aussen");
      fval(id(aussen_temp).state, "%.1f °C", buf, sizeof(buf));
      it.print(70, y + 28, id(font_value), buf);

      it.filled_rectangle(x1, y + 72, 240, 1);

      // -- SOC Haus --
      y = 142;
      it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F10A3");
      it.print(70, y, id(font_label), "SOC Haus");
      fval(id(soc_haus).state, "%.0f %%", buf, sizeof(buf));
      it.print(70, y + 28, id(font_value), buf);

      it.filled_rectangle(x1, y + 72, 240, 1);

      // -- SOC Auto --
      y = 220;
      it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F007D");
      it.print(70, y, id(font_label), "SOC Auto");
      fval(id(soc_auto).state, "%.0f %%", buf, sizeof(buf));
      it.print(70, y + 28, id(font_value), buf);

      it.filled_rectangle(x1, y + 72, 240, 1);

      // -- PV Produktion --
      y = 298;
      it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F1A73");
      it.print(70, y, id(font_label), "PV Produktion");
      fval(id(pv_produktion).state, "%.1f kWh", buf, sizeof(buf));
      it.print(70, y + 28, id(font_value), buf);

      it.filled_rectangle(x1, y + 72, 240, 1);

      // -- Alarm (offene Fenster) --
      y = 376;
      bool eg = id(fenster_eg).state;
      bool og = id(fenster_og).state;
      if (eg && og) {
        it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0FC6");
        it.print(70, y + 8, id(font_label), "Fenster EG & OG");
      } else if (eg) {
        it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0FC6");
        it.print(70, y + 8, id(font_label), "Fenster EG offen");
      } else if (og) {
        it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0FC6");
        it.print(70, y + 8, id(font_label), "Fenster OG offen");
      } else {
        it.printf(icon_x, y + 20, id(font_icon), TextAlign::CENTER, "\U000F11DB");
        it.print(70, y + 8, id(font_label), "Alle Fenster zu");
      }

      // ===== SPALTE 2 (mitte): Wetter =====
      int x2 = 278;

      // -- Vorhersage --
      y = 64;
      it.printf(x2 + 30, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0590");
      it.print(x2 + 58, y, id(font_label), "Vorhersage");
      it.print(x2 + 58, y + 28, id(font_tiny), "-- (Platzhalter)");

      it.filled_rectangle(x2, y + 72, 240, 1);

      // -- Wetter / Temperatur --
      y = 142;
      it.printf(x2 + 30, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0599");
      it.print(x2 + 58, y, id(font_label), "Wetter");
      it.print(x2 + 58, y + 28, id(font_tiny), "-- (Platzhalter)");

      it.filled_rectangle(x2, y + 72, 240, 1);

      // -- PV Produktion (Spalte 2) --
      y = 220;
      it.printf(x2 + 30, y + 20, id(font_icon), TextAlign::CENTER, "\U000F1A73");
      it.print(x2 + 58, y, id(font_label), "PV Produktion");
      fval(id(pv_produktion).state, "%.1f kWh", buf, sizeof(buf));
      it.print(x2 + 58, y + 28, id(font_value), buf);

      it.filled_rectangle(x2, y + 72, 240, 1);

      // -- Wind --
      y = 298;
      it.printf(x2 + 30, y + 20, id(font_icon), TextAlign::CENTER, "\U000F059D");
      it.print(x2 + 58, y, id(font_label), "Wind");
      it.print(x2 + 58, y + 28, id(font_tiny), "-- (Platzhalter)");

      // ===== SPALTE 3 (rechts): Termine & Muellabfuhr =====
      int x3 = 545;

      // -- Termine von heute --
      y = 64;
      it.printf(x3 + 30, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0A02");
      it.print(x3 + 58, y, id(font_label), "Termine heute");

      it.print(x3 + 12, y + 50, id(font_termin), "-- (Platzhalter)");
      it.print(x3 + 12, y + 72, id(font_termin), "-- (Platzhalter)");
      it.print(x3 + 12, y + 94, id(font_termin), "-- (Platzhalter)");

      it.filled_rectangle(x3, y + 240, 240, 1);

      // -- Muellabfuhr --
      y = 316;
      it.printf(x3 + 30, y + 20, id(font_icon), TextAlign::CENTER, "\U000F0F38");
      it.print(x3 + 58, y, id(font_label), "Muellabfuhr");
      it.print(x3 + 58, y + 28, id(font_tiny), "-- (Platzhalter)");

      // ===== STATUSLEISTE =====
      it.filled_rectangle(0, 424, 800, 56);
      it.filled_rectangle(266, 428, 2, 46, COLOR_ON);
      it.filled_rectangle(533, 428, 2, 46, COLOR_ON);

      // -- Heizmodus --
      it.printf(36, 450, id(font_icon), COLOR_OFF, TextAlign::CENTER, "\U000F1A44");
      it.print(66, 430, id(font_status), COLOR_OFF, "Heizmodus");
      if (id(heizmodus).has_state()) {
        it.print(66, 452, id(font_status), COLOR_OFF, id(heizmodus).state.c_str());
      } else {
        it.print(66, 452, id(font_status), COLOR_OFF, "--");
      }

      // -- Pool ein/aus --
      it.printf(303, 450, id(font_icon), COLOR_OFF, TextAlign::CENTER, "\U000F1402");
      it.print(333, 430, id(font_status), COLOR_OFF, "Pool");
      it.print(333, 452, id(font_status), COLOR_OFF,
               id(poolpumpe_an).state ? "EIN" : "AUS");

      // -- Auto laden --
      it.printf(570, 450, id(font_icon), COLOR_OFF, TextAlign::CENTER, "\U000F0EBB");
      it.print(600, 430, id(font_status), COLOR_OFF, "Auto laden");
      fval(id(wallbox_power).state, "%.0f W", buf, sizeof(buf));
      it.print(600, 452, id(font_status), COLOR_OFF, buf);
