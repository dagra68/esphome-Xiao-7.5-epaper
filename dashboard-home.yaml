esphome:
  name: dashboard-home
  friendly_name: Dashboard Home

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_IDF_TARGET: "esp32c3"

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

globals:
  - id: wifi_status
    type: int
    restore_value: no
    initial_value: "0"
  - id: first_update_done
    type: bool
    restore_value: no
    initial_value: "false"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - lambda: |-
          id(wifi_status) = 1;
  on_disconnect:
    then:
      - lambda: |-
          id(wifi_status) = 0;

captive_portal:

# deep_sleep:
#   id: deep_sleep_1
#   run_duration: 2min
#   sleep_duration: 5min

script:
  - id: update_display
    then:
      - component.update: my_display

interval:
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: "return !isnan(id(aussen_temp).state);"
              - lambda: "return !id(first_update_done);"
          then:
            - lambda: |-
                ESP_LOGD("Display", "Updating Display...");
            - script.execute: update_display
            - lambda: "id(first_update_done) = true;"
            - delay: 10s
            - logger.log: "Display update done."
            # - deep_sleep.enter: deep_sleep_1

time:
  - platform: homeassistant
    id: homeassistant_time

# --- Sensoren ---

sensor:
  - platform: homeassistant
    id: aussen_temp
    entity_id: sensor.gw1100a_v2_2_3_outdoor_temperature
    name: "Aussentemperatur"

  - platform: homeassistant
    id: soc_haus
    entity_id: sensor.ess_akku_soc
    name: "SOC Haus"

  - platform: homeassistant
    id: soc_auto
    entity_id: sensor.tesla_model_y_battery
    name: "SOC Auto"

  - platform: homeassistant
    id: pv_produktion
    entity_id: sensor.energy_solar_daily
    name: "PV Produktion"

  - platform: homeassistant
    id: wallbox_power
    entity_id: sensor.ess_power_wallbox
    name: "Wallbox Leistung"

  - platform: homeassistant
    id: wetter_temperatur
    entity_id: weather.home
    attribute: temperature
    name: "Wetter Temperatur"

  - platform: homeassistant
    id: wetter_wind
    entity_id: weather.home
    attribute: wind_speed
    name: "Wind"

text_sensor:
  - platform: homeassistant
    id: heizmodus
    entity_id: sensor.wp_modus_text
    name: "Heizmodus"

  - platform: homeassistant
    id: wetter_zustand
    entity_id: weather.home
    name: "Wetter Zustand"

  - platform: homeassistant
    id: wetter_vorhersage
    entity_id: sensor.wetter_vorhersage_text
    name: "Vorhersage"

  - platform: homeassistant
    id: termin_1
    entity_id: sensor.kalender_termin_1
    name: "Termin 1"

  - platform: homeassistant
    id: termin_2
    entity_id: sensor.kalender_termin_2
    name: "Termin 2"

  - platform: homeassistant
    id: termin_3
    entity_id: sensor.kalender_termin_3
    name: "Termin 3"

  - platform: homeassistant
    id: muellabfuhr
    entity_id: sensor.muellabfuhr_naechster
    name: "Muellabfuhr"

binary_sensor:
  - platform: homeassistant
    id: poolpumpe_an
    entity_id: switch.pool_umwalzpumpe
    name: "Poolpumpe"

  - platform: homeassistant
    id: fenster_eg
    entity_id: binary_sensor.fenster_eg_alle
    name: "Fenster EG"

  - platform: homeassistant
    id: fenster_og
    entity_id: binary_sensor.fenster_og_alle
    name: "Fenster OG"

  - platform: homeassistant
    id: waermepumpe_an
    entity_id: switch.pool_warmepumpe
    name: "Pool Waermepumpe"

font:
  - file: "gfonts://Montserrat@900"
    id: font_header
    size: 26
  - file: "gfonts://Montserrat@900"
    id: font_label
    size: 22
  - file: "gfonts://Montserrat@900"
    id: font_value
    size: 36
  - file: "gfonts://Montserrat@900"
    id: font_status
    size: 20
  - file: "gfonts://Montserrat@900"
    id: font_tiny
    size: 18
  - file: "gfonts://Montserrat@900"
    id: font_termin
    size: 16

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 36
    glyphs:
      - "\U000F050F"   # thermometer
      - "\U000F10A3"   # home-battery
      - "\U000F007D"   # car-battery (Tesla SOC)
      - "\U000F1A73"   # solar-power (PV)
      - "\U000F0590"   # weather-cloudy
      - "\U000F0599"   # weather-sunny
      - "\U000F059D"   # weather-windy
      - "\U000F0A02"   # calendar-today
      - "\U000F0F38"   # trash-can (Muellabfuhr)
      - "\U000F1402"   # pump (Pool)
      - "\U000F1A44"   # heat-pump (Heizmodus)
      - "\U000F0EBB"   # ev-station (Auto laden)
      - "\U000F0FC6"   # window-open
      - "\U000F11DB"   # window-closed
      - "\U000F051F"   # wifi-off

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    model: 7.50inv2
    update_interval: 50s
    lambda: |-
      auto fval = [](float v, const char* fmt, char* buf, size_t sz) {
        if (!isnan(v)) snprintf(buf, sz, fmt, v);
        else           snprintf(buf, sz, "--");
      };

      char buf[24];

      // Layout: 4 Spalten (A=0-199, B=200-399, C=400-599, D=600-799)
      // 7 Zeilen + Header + Statusleiste
      const int cA = 8;
      const int cB = 208;
      const int cC = 408;
      const int cD = 608;
      const int rh = 52;     // row height
      const int hdr = 44;    // header height

      // ===== ZEILE 1: KOPFZEILE (invertiert) =====
      it.filled_rectangle(0, 0, 800, hdr);
      it.strftime(12, hdr / 2, id(font_header), COLOR_OFF, TextAlign::CENTER_LEFT,
                   "%a %d.%m.%Y", id(homeassistant_time).now());
      it.strftime(790, hdr / 2, id(font_header), COLOR_OFF, TextAlign::CENTER_RIGHT,
                   "Update %H:%M", id(homeassistant_time).now());

      // Trennlinie unter Header
      it.filled_rectangle(0, hdr, 800, 2);

      // Spalten-Trennlinien (4 Spalten)
      int content_top = hdr + 2;
      int content_h = 370;
      it.filled_rectangle(200, content_top, 1, content_h);
      it.filled_rectangle(400, content_top, 1, content_h);
      it.filled_rectangle(600, content_top, 1, content_h);

      // Zeilen-Trennlinien (6 horizontale Linien fuer 7 Zeilen)
      for (int i = 1; i <= 6; i++) {
        int ly = content_top + i * rh;
        if (i < 6) it.filled_rectangle(0, ly, 400, 1);
      }

      // Zeilen y-Positionen
      int row[7];
      for (int i = 0; i < 7; i++) row[i] = content_top + 4 + i * rh;

      // ===== SPALTE A =====

      // Zeile 2: Temp aussen
      it.print(cA, row[0], id(font_label), "Temp aussen");
      fval(id(aussen_temp).state, "%.1f °C", buf, sizeof(buf));
      it.print(cA, row[0] + 24, id(font_tiny), buf);

      // Zeile 3: (leer, Temp gehoert zu Zeile 2)

      // Zeile 4: SOC Haus
      it.print(cA, row[2], id(font_label), "SOC Haus");
      fval(id(soc_haus).state, "%.0f %%", buf, sizeof(buf));
      it.print(cA, row[2] + 24, id(font_tiny), buf);

      // Zeile 5: SOC Auto
      it.print(cA, row[3], id(font_label), "SOC Auto");
      fval(id(soc_auto).state, "%.0f %%", buf, sizeof(buf));
      it.print(cA, row[3] + 24, id(font_tiny), buf);

      // Zeile 6: PV Produktion
      it.print(cA, row[4], id(font_label), "PV Produktion");
      fval(id(pv_produktion).state, "%.1f kWh", buf, sizeof(buf));
      it.print(cA, row[4] + 24, id(font_tiny), buf);

      // Zeile 7: Alarm (offene Fenster) - volle Breite Spalte A+B
      int alarm_y = row[5] + rh;
      it.filled_rectangle(0, alarm_y - 4, 400, 1);
      bool eg = id(fenster_eg).state;
      bool og = id(fenster_og).state;
      it.printf(cA + 18, alarm_y + 18, id(font_icon), TextAlign::CENTER,
                (eg || og) ? "\U000F0FC6" : "\U000F11DB");
      if (eg && og) {
        it.print(cA + 40, alarm_y + 4, id(font_label), "Fenster EG & OG");
      } else if (eg) {
        it.print(cA + 40, alarm_y + 4, id(font_label), "Fenster EG offen");
      } else if (og) {
        it.print(cA + 40, alarm_y + 4, id(font_label), "Fenster OG offen");
      } else {
        it.print(cA + 40, alarm_y + 4, id(font_label), "Alle Fenster zu");
      }

      // ===== SPALTE B =====

      // Zeile 2: Vorhersage
      it.print(cB, row[0], id(font_label), "Vorhersage");
      if (id(wetter_vorhersage).has_state()) {
        it.print(cB, row[0] + 24, id(font_tiny), id(wetter_vorhersage).state.c_str());
      }

      // Zeile 3: Wetter
      it.print(cB, row[1], id(font_label), "Wetter");
      if (id(wetter_zustand).has_state()) {
        it.print(cB, row[1] + 24, id(font_tiny), id(wetter_zustand).state.c_str());
      }

      // Zeile 4: Temperatur
      it.print(cB, row[2], id(font_label), "Temperatur");
      fval(id(wetter_temperatur).state, "%.1f °C", buf, sizeof(buf));
      it.print(cB, row[2] + 24, id(font_tiny), buf);

      // Zeile 5: PV Produktion
      it.print(cB, row[3], id(font_label), "PV Produktion");
      fval(id(pv_produktion).state, "%.1f kWh", buf, sizeof(buf));
      it.print(cB, row[3] + 24, id(font_tiny), buf);

      // Zeile 6: Wind
      it.print(cB, row[4], id(font_label), "Wind");
      fval(id(wetter_wind).state, "%.0f km/h", buf, sizeof(buf));
      it.print(cB, row[4] + 24, id(font_tiny), buf);

      // ===== SPALTE C+D: Termine =====

      // Trennlinie Termine-Bereich (rechte Haelfte eigenes Grid)
      it.print(cC, row[0], id(font_label), "Termine von heute");
      it.print(cC, row[0] + 24, id(font_tiny), "Liste Uhrzeit +Termine");

      // Terminliste ab Zeile 3
      int ty = row[1] + 4;
      if (id(termin_1).has_state() && id(termin_1).state != "none") {
        it.print(cC, ty, id(font_termin), id(termin_1).state.c_str());
        ty += 20;
      }
      if (id(termin_2).has_state() && id(termin_2).state != "none") {
        it.print(cC, ty, id(font_termin), id(termin_2).state.c_str());
        ty += 20;
      }
      if (id(termin_3).has_state() && id(termin_3).state != "none") {
        it.print(cC, ty, id(font_termin), id(termin_3).state.c_str());
      }
      if ((!id(termin_1).has_state() || id(termin_1).state == "none") &&
          (!id(termin_2).has_state() || id(termin_2).state == "none") &&
          (!id(termin_3).has_state() || id(termin_3).state == "none")) {
        it.print(cC, row[1] + 4, id(font_termin), "Keine Termine heute");
      }

      // Muellabfuhr (Spalte D, unterer Bereich)
      int muell_y = row[4];
      it.filled_rectangle(400, muell_y - 4, 400, 1);
      it.printf(cD + 18, muell_y + 18, id(font_icon), TextAlign::CENTER, "\U000F0F38");
      it.print(cD + 40, muell_y, id(font_label), "Muellabfuhr");
      if (id(muellabfuhr).has_state()) {
        it.print(cD + 40, muell_y + 24, id(font_tiny), id(muellabfuhr).state.c_str());
      }

      // ===== STATUSLEISTE (4 Felder) =====
      int sb = 424;
      it.filled_rectangle(0, sb, 800, 56);
      it.filled_rectangle(200, sb + 4, 1, 48, COLOR_ON);
      it.filled_rectangle(400, sb + 4, 1, 48, COLOR_ON);
      it.filled_rectangle(600, sb + 4, 1, 48, COLOR_ON);

      // Heizmodus
      it.printf(16, sb + 28, id(font_icon), COLOR_OFF, TextAlign::CENTER_LEFT, "\U000F1A44");
      it.print(50, sb + 6, id(font_status), COLOR_OFF, "Heizmodus");
      if (id(heizmodus).has_state()) {
        it.print(50, sb + 30, id(font_status), COLOR_OFF, id(heizmodus).state.c_str());
      } else {
        it.print(50, sb + 30, id(font_status), COLOR_OFF, "--");
      }

      // Poolpumpe Ein/Aus
      it.printf(216, sb + 28, id(font_icon), COLOR_OFF, TextAlign::CENTER_LEFT, "\U000F1402");
      it.print(250, sb + 6, id(font_status), COLOR_OFF, "Poolpumpe");
      it.print(250, sb + 30, id(font_status), COLOR_OFF,
               id(poolpumpe_an).state ? "EIN" : "AUS");

      // Pool WP Ein/Aus
      it.printf(416, sb + 28, id(font_icon), COLOR_OFF, TextAlign::CENTER_LEFT, "\U000F1A44");
      it.print(450, sb + 6, id(font_status), COLOR_OFF, "Pool WP");
      it.print(450, sb + 30, id(font_status), COLOR_OFF,
               id(waermepumpe_an).state ? "EIN" : "AUS");

      // Auto laden
      it.printf(616, sb + 28, id(font_icon), COLOR_OFF, TextAlign::CENTER_LEFT, "\U000F0EBB");
      it.print(650, sb + 6, id(font_status), COLOR_OFF, "Auto laden");
      fval(id(wallbox_power).state, "%.0f W", buf, sizeof(buf));
      it.print(650, sb + 30, id(font_status), COLOR_OFF, buf);
