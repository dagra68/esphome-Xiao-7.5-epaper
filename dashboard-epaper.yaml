esphome:
  name: dashboard-epaper
  friendly_name: Dashboard ePaper

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

globals:
  - id: wifi_status
    type: int
    restore_value: no
    initial_value: "0"
  - id: first_update_done
    type: bool
    restore_value: no
    initial_value: "false"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - lambda: |-
          id(wifi_status) = 1;
  on_disconnect:
    then:
      - lambda: |-
          id(wifi_status) = 0;

captive_portal:

deep_sleep:
  id: deep_sleep_1
  run_duration: 1min
  sleep_duration: 5min

script:
  - id: update_display
    then:
      - component.update: my_display

interval:
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - lambda: "return !isnan(id(pool_temp).state);"
              - lambda: "return !id(first_update_done);"
          then:
            - lambda: |-
                ESP_LOGD("Display", "Updating Display...");
            - script.execute: update_display
            - lambda: "id(first_update_done) = true;"
  - interval: 59s
    then:
      - logger.log: "Entering deep sleep now..."

time:
  - platform: homeassistant
    id: homeassistant_time

sensor:
  - platform: homeassistant
    id: pool_temp
    entity_id: sensor.pool_temperature
    name: "Pool Temperatur"

  - platform: homeassistant
    id: pool_redox
    entity_id: sensor.pool_oxydo_reduction_potential
    name: "Pool Redox"

  - platform: homeassistant
    id: pool_ph
    entity_id: sensor.pool_ph
    name: "Pool pH"

  - platform: homeassistant
    id: energie_pool_daily
    entity_id: sensor.energy_consumption_pool_daily
    name: "Pool Verbrauch"

  - platform: homeassistant
    id: aussen_temp
    entity_id: sensor.gw1100a_v2_2_3_outdoor_temperature
    name: "Aussentemperatur"

  - platform: homeassistant
    id: uv_wert
    entity_id: sensor.gw1100a_v2_2_3_uv_index
    name: "UV-Index"

  - platform: homeassistant
    id: pv_produktion
    entity_id: sensor.energy_solar_daily
    name: "PV Produktion"

binary_sensor:
  - platform: homeassistant
    id: poolpumpe_an
    entity_id: switch.pool_umwalzpumpe
    name: "Poolpumpe"

  - platform: homeassistant
    id: waermepumpe_an
    entity_id: switch.pool_warmepumpe
    name: "Waermepumpe"

font:
  - file: "gfonts://Montserrat@900"
    id: font_label
    size: 18
  - file: "gfonts://Montserrat@900"
    id: font_value
    size: 51
  - file: "gfonts://Montserrat@900"
    id: font_header
    size: 26
  - file: "gfonts://Montserrat@900"
    id: font_status
    size: 20
  - file: "gfonts://Montserrat@900"
    id: font_tiny
    size: 21

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_icon_big
    size: 48
    glyphs:
      - "\U000F1A5F"   # pool-thermometer (Pool Temp)
      - "\U000F050F"   # thermometer (Aussen Temp)
      - "\U000F0668"   # redox
      - "\U000F17C5"   # ph (pH)
      - "\U000F1402"   # pool-pump (Poolpumpe)
      - "\U000F1A44"   # waermepumpe
      - "\U000F1A57"   # pool-energie
      - "\U000F0590"   # weather-cloudy (Aussen = gleich wie Pool Temp Basis)
      - "\U000F0599"   # weather-sunny (UV)
      - "\U000F1A73"   # solar (PV)
      - "\U000F051F"   # wifi-off

spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO3
    dc_pin: GPIO5
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO2
    model: 7.50inv2
    update_interval: 50s
    lambda: |-
      auto fval = [](float v, const char* fmt, char* buf, size_t sz) {
        if (!isnan(v)) snprintf(buf, sz, fmt, v);
        else           snprintf(buf, sz, "--");
      };

      char buf[24];

      // Kopfzeile
      it.filled_rectangle(0, 0, 800, 52);
      it.print(400, 26, id(font_header), COLOR_OFF, TextAlign::CENTER,
               "Pool & Garten");
      it.strftime(790, 36, id(font_tiny), COLOR_OFF, TextAlign::BOTTOM_RIGHT,
                  "Update %H:%M", id(homeassistant_time).now());

      // Gitternetz (gerade Linien, 2px)
      it.filled_rectangle(0,   52,  800, 2);
      it.filled_rectangle(0,   422, 800, 2);
      it.filled_rectangle(0,   52,  2,   372);
      it.filled_rectangle(798, 52,  2,   372);
      it.filled_rectangle(265, 52,  2,   372);
      it.filled_rectangle(532, 52,  2,   372);
      it.filled_rectangle(0,   237, 800, 2);

      const int col[3] = {8, 276, 544};
      const int row[2] = {58, 243};

      // [0,0] Pool Temp
      it.print(col[0]+12, row[0]+8, id(font_label), "Pool Temp");
      it.printf(col[0]+50, row[0]+72, id(font_icon_big),
                TextAlign::CENTER, "\U000F1A5F");
      fval(id(pool_temp).state, "%.1f", buf, sizeof(buf));
      it.printf(col[0]+155, row[0]+92, id(font_value),
                TextAlign::CENTER, buf);
      it.print(col[0]+188, row[0]+112, id(font_tiny), "°C");

      // [1,0] Redox
      it.print(col[1]+12, row[0]+8, id(font_label), "Redox");
      it.printf(col[1]+50, row[0]+72, id(font_icon_big),
                TextAlign::CENTER, "\U000F0668");
      fval(id(pool_redox).state, "%.0f", buf, sizeof(buf));
      it.printf(col[1]+155, row[0]+92, id(font_value),
                TextAlign::CENTER, buf);
      it.print(col[1]+190, row[0]+112, id(font_tiny), "mV");

      // [2,0] pH
      it.print(col[2]+12, row[0]+8, id(font_label), "pH-Wert");
      it.printf(col[2]+50, row[0]+72, id(font_icon_big),
                TextAlign::CENTER, "\U000F17C5");
      fval(id(pool_ph).state, "%.1f", buf, sizeof(buf));
      it.printf(col[2]+155, row[0]+92, id(font_value),
                TextAlign::CENTER, buf);
      it.print(col[2]+190, row[0]+112, id(font_tiny), "pH");

      // [0,1] Aussen Temp
      it.print(col[0]+12, row[1]+8, id(font_label), "Aussen Temp");
      it.printf(col[0]+50, row[1]+72, id(font_icon_big),
                TextAlign::CENTER, "\U000F050F");
      fval(id(aussen_temp).state, "%.1f", buf, sizeof(buf));
      it.printf(col[0]+155, row[1]+92, id(font_value),
                TextAlign::CENTER, buf);
      it.print(col[0]+188, row[1]+112, id(font_tiny), "°C");

      // [1,1] UV-Index
      it.print(col[1]+12, row[1]+8, id(font_label), "UV-Index");
      it.printf(col[1]+50, row[1]+72, id(font_icon_big),
                TextAlign::CENTER, "\U000F0599");
      fval(id(uv_wert).state, "%.1f", buf, sizeof(buf));
      it.printf(col[1]+155, row[1]+92, id(font_value),
                TextAlign::CENTER, buf);
      it.print(col[1]+190, row[1]+112, id(font_tiny), "UV");

      // [2,1] PV Heute
      it.print(col[2]+12, row[1]+8, id(font_label), "PV Heute");
      it.printf(col[2]+50, row[1]+72, id(font_icon_big),
                TextAlign::CENTER, "\U000F1A73");
      fval(id(pv_produktion).state, "%.1f", buf, sizeof(buf));
      it.printf(col[2]+155, row[1]+92, id(font_value),
                TextAlign::CENTER, buf);
      it.print(col[2]+190, row[1]+112, id(font_tiny), "kWh");

      // Statusleiste
      it.filled_rectangle(0, 424, 800, 56);
      it.filled_rectangle(266, 428, 2, 46, COLOR_ON);
      it.filled_rectangle(533, 428, 2, 46, COLOR_ON);

      // Poolpumpe
      it.printf(36, 450, id(font_icon_big), COLOR_OFF,
                TextAlign::CENTER, "\U000F1402");
      it.print(66, 430, id(font_status), COLOR_OFF, "Poolpumpe");
      it.print(66, 452, id(font_status), COLOR_OFF,
               id(poolpumpe_an).state ? "EIN" : "AUS");

      // Waermepumpe
      it.printf(303, 450, id(font_icon_big), COLOR_OFF,
                TextAlign::CENTER, "\U000F1A44");
      it.print(333, 430, id(font_status), COLOR_OFF, "Waermepumpe");
      it.print(333, 452, id(font_status), COLOR_OFF,
               id(waermepumpe_an).state ? "EIN" : "AUS");

      // Pool Energie
      it.printf(570, 450, id(font_icon_big), COLOR_OFF,
                TextAlign::CENTER, "\U000F1A57");
      fval(id(energie_pool_daily).state, "%.2f kWh", buf, sizeof(buf));
      it.print(600, 430, id(font_status), COLOR_OFF, "Pool Verbrauch");
      it.print(600, 452, id(font_status), COLOR_OFF, buf);
