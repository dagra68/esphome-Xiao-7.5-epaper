# ============================================================
# Home Assistant Template Sensors for dashboard-home.yaml
# ============================================================
# Add these to your Home Assistant configuration.yaml under
# "template:" or as a separate file via "template: !include dashboard_templates.yaml"
#
# These sensors combine calendar events from multiple calendars
# and format them for the ePaper display.
# ============================================================

template:
  - trigger:
      - trigger: time_pattern
        minutes: "/5"
      - trigger: event
        event_type: homeassistant_started
    action:
      - action: calendar.get_events
        target:
          entity_id:
            - calendar.lukas
            - calendar.leonie
            - calendar.familie
        data:
          duration:
            hours: 24
        response_variable: termine
      - action: calendar.get_events
        target:
          entity_id:
            - calendar.hoellersberg48_gmail_com
        data:
          duration:
            days: 14
        response_variable: muell
    sensor:
      - name: "Kalender Termin 1"
        unique_id: kalender_termin_1
        state: >
          {% set ns = namespace(all=[]) %}
          {% for cal in ['calendar.lukas','calendar.leonie','calendar.familie'] %}
            {% if cal in termine %}
              {% set ns.all = ns.all + termine[cal].events %}
            {% endif %}
          {% endfor %}
          {% set sorted = ns.all | sort(attribute='start') %}
          {% if sorted | length > 0 %}
            {{ sorted[0].start | as_timestamp | timestamp_custom('%H:%M') }} {{ sorted[0].summary }}
          {% else %}
            none
          {% endif %}

      - name: "Kalender Termin 2"
        unique_id: kalender_termin_2
        state: >
          {% set ns = namespace(all=[]) %}
          {% for cal in ['calendar.lukas','calendar.leonie','calendar.familie'] %}
            {% if cal in termine %}
              {% set ns.all = ns.all + termine[cal].events %}
            {% endif %}
          {% endfor %}
          {% set sorted = ns.all | sort(attribute='start') %}
          {% if sorted | length > 1 %}
            {{ sorted[1].start | as_timestamp | timestamp_custom('%H:%M') }} {{ sorted[1].summary }}
          {% else %}
            none
          {% endif %}

      - name: "Kalender Termin 3"
        unique_id: kalender_termin_3
        state: >
          {% set ns = namespace(all=[]) %}
          {% for cal in ['calendar.lukas','calendar.leonie','calendar.familie'] %}
            {% if cal in termine %}
              {% set ns.all = ns.all + termine[cal].events %}
            {% endif %}
          {% endfor %}
          {% set sorted = ns.all | sort(attribute='start') %}
          {% if sorted | length > 2 %}
            {{ sorted[2].start | as_timestamp | timestamp_custom('%H:%M') }} {{ sorted[2].summary }}
          {% else %}
            none
          {% endif %}

      - name: "Muellabfuhr Naechster"
        unique_id: muellabfuhr_naechster
        state: >
          {% set events = muell['calendar.hoellersberg48_gmail_com'].events | sort(attribute='start') %}
          {% if events | length > 0 %}
            {{ events[0].start | as_timestamp | timestamp_custom('%a %d.%m') }} {{ events[0].summary }}
          {% else %}
            --
          {% endif %}

      - name: "Wetter Vorhersage Text"
        unique_id: wetter_vorhersage_text
        state: >
          {% set forecast = state_attr('weather.home', 'forecast') %}
          {% if forecast and forecast | length > 0 %}
            {{ forecast[0].condition }} {{ forecast[0].temperature }}°C
          {% else %}
            {{ states('weather.home') }}
          {% endif %}
